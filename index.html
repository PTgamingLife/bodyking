.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(5,12,5,0.55) 0%,
    rgba(5,12,5,0.72) 40%,
    rgba(5,12,5,0.88) 70%,
    rgba(5,12,5,0.96) 100%);
  z-index: 1;
}
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(57,255,20,0.04) 32px),
    repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(57,255,20,0.04) 32px);
  z-index: 2;
  pointer-events: none;
}

/* Stars */
.stars { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation:twinkle var(--d,3s) var(--delay,0s) infinite; }
@keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.9} }

/* ===== APP SHELL ===== */
#app {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== SCREENS ===== */
.screen { display:none; flex-direction:column; height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.screen.active { display:flex; }
.screen-inner { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 16px; gap:16px; }

/* ===== PIXEL CARD ===== */
.card {
  background: var(--bg-panel);
  border: 2px solid var(--green-bright);
  box-shadow: 4px 4px 0 #000, 0 0 16px rgba(57,255,20,0.15);
  padding: 20px 16px;
  width: 100%;
  max-width: 420px;
  position: relative;
  backdrop-filter: blur(4px);
}
.card::after {
  content:'';
  position:absolute;
  inset:2px;
  border:1px solid rgba(57,255,20,0.2);
  pointer-events:none;
}

/* ===== PIXEL INPUT ===== */
.px-input {
  background: rgba(0,5,0,0.8);
  border: 2px solid var(--green-dark);
  color: var(--green-bright);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 16px;
  padding: 12px 14px;
  width: 100%;
  outline: none;
  border-radius: 0;
  -webkit-appearance: none;
  transition: border-color .2s;
}
.px-input:focus { border-color: var(--green-bright); box-shadow: 0 0 10px rgba(57,255,20,0.3); }
.px-input::placeholder { color: rgba(57,255,20,0.3); }

/* ===== PIXEL BUTTON ===== */
.px-btn {
  background: var(--green-dark);
  border: 2px solid var(--green-bright);
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 13px 20px;
  cursor: pointer;
  width: 100%;
  box-shadow: 3px 3px 0 #000;
  letter-spacing: 1px;
  transition: transform .1s, box-shadow .1s;
  -webkit-appearance: none;
  border-radius: 0;
  touch-action: manipulation;
}
.px-btn:active:not(:disabled) { transform:translate(3px,3px); box-shadow:0 0 0 #000; }
.px-btn:disabled { opacity:.35; }
.px-btn.orange { background:var(--orange-dark); border-color:var(--orange-bright); }
.px-btn.gold { background:#6b4a00; border-color:var(--gold); color:var(--gold); font-family:'Press Start 2P',monospace; font-size:10px; letter-spacing:2px; }
.px-btn.gold:active:not(:disabled) { transform:translate(3px,3px); box-shadow:0 0 0; }

/* ===== LOGO ===== */
.logo-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(13px,4vw,18px);
  color: var(--orange-bright);
  text-shadow: 3px 3px 0 #000, 0 0 20px var(--orange-bright), 0 0 40px rgba(255,107,0,.4);
  text-align: center;
  line-height: 1.8;
}
.logo-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--green-bright);
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 2px 2px 0 #000;
}
.logo-tagline { font-size:11px; color:rgba(57,255,20,.4); text-align:center; letter-spacing:3px; }

/* ===== SECTION LABEL ===== */
.s-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--orange-bright);
  letter-spacing: 1px;
  margin-bottom: 8px;
}

/* ===== CHARACTER SELECT ===== */
.char-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  width: 100%;
  max-width: 420px;
}
.char-card {
  background: rgba(0,5,0,.8);
  border: 2px solid var(--green-dark);
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s;
  box-shadow: 2px 2px 0 #000;
  touch-action: manipulation;
}
.char-card:active, .char-card.sel { border-color:var(--orange-bright); background:rgba(30,15,0,.9); box-shadow:0 0 12px rgba(255,107,0,.35); }
.char-card svg { width:56px; height:72px; display:block; margin:0 auto 4px; }
.char-card .cname { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--green-bright); line-height:1.4; }
.char-card.sel .cname { color:var(--orange-bright); }

/* ===== TEAM SELECT ===== */
.team-item {
  background: rgba(0,5,0,.8);
  border: 2px solid var(--green-dark);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 2px 2px 0 #000;
  transition: border-color .15s;
  touch-action: manipulation;
}
.team-item:active, .team-item.sel { border-color:var(--orange-bright); background:rgba(30,15,0,.9); }
.team-item .tname { font-size:15px; font-weight:700; color:var(--green-bright); }
.team-item .tcount { font-size:11px; color:rgba(57,255,20,.5); }
.create-row { display:flex; gap:8px; margin-top:10px; }
.create-row .px-input { flex:1; }
.create-row .px-btn { width:auto; padding:0 16px; }

/* ===== GAME SCREEN ===== */
#gameScreen {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
#gameScreen.active { display:flex; }

/* Header */
.g-header {
  background: rgba(3,8,3,.92);
  border-bottom: 2px solid var(--green-bright);
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  backdrop-filter: blur(6px);
}
.g-title { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--orange-bright); text-shadow:2px 2px 0 #000; }
.g-badge {
  border: 2px solid var(--green-bright);
  padding: 4px 8px;
  font-family:'Press Start 2P',monospace;
  font-size:7px;
  color:var(--green-bright);
  background: rgba(0,0,0,.5);
  display:flex; align-items:center; gap:5px;
}
.countdown-badge { border-color:var(--orange-bright); color:var(--orange-bright); }

/* Game body scroll */
.g-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
}

/* Arena */
.arena {
  background: linear-gradient(180deg, rgba(2,6,2,.7) 0%, rgba(8,16,8,.85) 100%);
  border-bottom: 2px solid var(--green-dark);
  padding: 10px 8px 6px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.arena-floor-line {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background: repeating-linear-gradient(90deg,var(--green-bright) 0,var(--green-bright) 8px,transparent 8px,transparent 16px);
  opacity:.4;
}
.arena-teams { display:flex; justify-content:space-between; align-items:flex-end; position:relative; z-index:1; }
.a-team-col { display:flex; flex-direction:column; align-items:center; gap:3px; }
.a-team-label {
  font-family:'Press Start 2P',monospace; font-size:7px;
  padding:2px 6px; border:1px solid;
  white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis;
}
.a-team-label.left { color:var(--blue-hp); border-color:var(--blue-hp); background:rgba(45,156,255,.1); }
.a-team-label.right { color:var(--red-hp); border-color:var(--red-hp); background:rgba(255,45,45,.1); }
.fighters-row { display:flex; gap:3px; align-items:flex-end; }
.fighter { display:flex; flex-direction:column; align-items:center; gap:1px; }
.fighter-name { font-family:'Press Start 2P',monospace; font-size:6px; color:rgba(255,255,255,.7); max-width:48px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
.fighter-char svg { width:46px; height:60px; }
.fighter-char.me svg { filter:drop-shadow(0 0 6px var(--orange-bright)); }
.arena-vs { font-family:'Press Start 2P',monospace; font-size:14px; color:var(--gold); text-shadow:2px 2px 0 #000,0 0 16px var(--gold); align-self:center; flex-shrink:0; }

/* HP Bar */
.hp-wrap {
  background: rgba(3,8,3,.9);
  border-bottom: 2px solid var(--green-dark);
  padding: 8px 14px;
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}
.hp-bar {
  background:#020502; border:2px solid var(--green-dark);
  height:28px; position:relative; overflow:hidden;
  box-shadow:2px 2px 0 #000, inset 0 2px 3px rgba(0,0,0,.8);
}
.hp-left { position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,#1040ff,var(--blue-hp)); transition:width 1s cubic-bezier(.25,.46,.45,.94); min-width:2px; }
.hp-right { position:absolute; right:0; top:0; bottom:0; background:linear-gradient(270deg,#ff1010,var(--red-hp)); transition:width 1s cubic-bezier(.25,.46,.45,.94); min-width:2px; }
.hp-divider { position:absolute; left:50%; top:0; bottom:0; width:2px; background:var(--gold); box-shadow:0 0 6px var(--gold); transform:translateX(-50%); z-index:2; }
.hp-scores { display:flex; justify-content:space-between; margin-top:4px; }
.hp-score { font-family:'Press Start 2P',monospace; font-size:11px; }
.hp-score.l { color:var(--blue-hp); text-shadow:0 0 6px var(--blue-hp); }
.hp-score.r { color:var(--red-hp); text-shadow:0 0 6px var(--red-hp); }
.hp-names { display:flex; justify-content:space-between; margin-top:2px; }
.hp-tname { font-size:10px; color:rgba(255,255,255,.45); }

/* Mission */
.mission {
  flex: 1;
  padding: 12px 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.m-title {
  font-family:'Press Start 2P',monospace; font-size:8px;
  color:var(--gold); text-align:center; letter-spacing:2px;
  text-shadow:2px 2px 0 #000;
}
.m-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.m-panel-title { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--orange-bright); margin-bottom:6px; }

/* Photo box */
.photo-box {
  background:rgba(0,4,0,.8); border:2px dashed var(--green-dark);
  min-height:100px; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  cursor:pointer; position:relative; overflow:hidden;
  transition:border-color .2s;
  touch-action:manipulation;
}
.photo-box.has-photo { border-style:solid; border-color:var(--green-bright); }
.photo-box img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.photo-icon { font-size:26px; margin-bottom:4px; position:relative; z-index:1; }
.photo-lbl { font-size:9px; color:rgba(57,255,20,.5); text-align:center; position:relative; z-index:1; }
.photo-ok { position:absolute; top:4px; right:4px; background:var(--green-bright); color:#000; font-size:9px; font-weight:700; padding:2px 5px; z-index:2; }

/* Protein panel */
.protein-panel {
  background:rgba(0,4,0,.8); border:2px solid var(--green-dark);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; padding:8px;
}
.protein-num { font-family:'Press Start 2P',monospace; font-size:26px; color:var(--orange-bright); text-shadow:3px 3px 0 #000,0 0 16px var(--orange-bright); }
.muscle-btn {
  background:var(--orange-dark); border:2px solid var(--orange-bright);
  width:64px; height:64px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  box-shadow:3px 3px 0 #000; touch-action:manipulation;
  transition:transform .1s, box-shadow .1s;
}
.muscle-btn:active { transform:translate(3px,3px); box-shadow:0 0 0; }
.muscle-btn svg { width:40px; height:40px; }
.muscle-btn.flex svg { animation:mFlex .25s ease; }
@keyframes mFlex { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
.protein-hint { font-family:'Press Start 2P',monospace; font-size:6px; color:rgba(255,107,0,.5); text-align:center; line-height:1.6; }

/* Submit */
.submit-btn {
  background:linear-gradient(180deg,#6b4a00,#4a3200);
  border:2px solid var(--gold); color:var(--gold);
  font-family:'Press Start 2P',monospace; font-size:10px;
  padding:14px; cursor:pointer; width:100%;
  box-shadow:3px 3px 0 #000,0 0 16px rgba(255,215,0,.15);
  letter-spacing:2px; transition:transform .1s, box-shadow .1s;
  touch-action:manipulation;
}
.submit-btn:active:not(:disabled) { transform:translate(3px,3px); box-shadow:0 0 0; }
.submit-btn:disabled { opacity:.3; }

.done-banner {
  background:rgba(0,20,0,.8); border:2px solid var(--green-mid);
  padding:12px; text-align:center;
  font-family:'Press Start 2P',monospace; font-size:8px;
  color:var(--green-bright); box-shadow:2px 2px 0 #000; line-height:2;
}

/* ===== OVERLAYS ===== */
.levelup-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center;
  z-index:9000; flex-direction:column; gap:12px;
}
.levelup-overlay.on { display:flex; }
.lu-text {
  font-family:'Press Start 2P',monospace;
  font-size:clamp(24px,7vw,46px);
  color:var(--gold); text-align:center; line-height:1.6;
  text-shadow:3px 3px 0 #000,0 0 30px var(--gold),0 0 60px var(--orange-bright);
  animation:luPulse .35s ease infinite alternate;
}
.lu-sub { font-size:clamp(11px,3vw,16px); color:#fff; font-family:'Noto Sans TC',sans-serif; font-weight:700; }
@keyframes luPulse { from{transform:scale(1)} to{transform:scale(1.04)} }
.lu-sparks { font-size:36px; animation:sparkSpin .5s linear infinite; }
@keyframes sparkSpin { to{transform:rotate(360deg)} }

/* Toast */
.toast {
  position:fixed; bottom:calc(24px + var(--safe-bottom)); left:50%;
  transform:translateX(-50%) translateY(80px);
  background:rgba(8,18,8,.95); border:2px solid var(--green-bright);
  padding:10px 20px; font-family:'Press Start 2P',monospace; font-size:9px;
  color:var(--green-bright); box-shadow:3px 3px 0 #000;
  z-index:9999; transition:transform .25s; max-width:88vw; text-align:center;
  backdrop-filter:blur(4px); line-height:1.6;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.err { border-color:var(--red-hp); color:var(--red-hp); }

/* Loading */
.loading {
  position:fixed; inset:0; background:var(--bg-dark);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:18px; z-index:99999;
}
.ld-bar-wrap { width:200px; background:#020502; border:2px solid var(--green-bright); height:18px; overflow:hidden; }
.ld-bar { height:100%; background:linear-gradient(90deg,var(--green-dark),var(--green-bright)); animation:ldFill 1.6s ease forwards; }
@keyframes ldFill { from{width:0} to{width:100%} }
.ld-text { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--green-bright); animation:blink .7s step-end infinite; }
@keyframes blink { 50%{opacity:0} }

#photoInput { display:none; }

/* Laugh */
@keyframes laughBounce {
  0%,100%{transform:translateY(0) rotate(0)}
  25%{transform:translateY(-10px) rotate(-5deg)}
  75%{transform:translateY(-6px) rotate(5deg)}
}
.fighter-char.laughing svg { animation:laughBounce .45s ease; }

/* Lock button */
.lock-btn {
  display: none;
  align-items: center; justify-content: center;
  gap: 6px;
  background: rgba(0,4,0,.85);
  border: 2px solid var(--green-dark);
  padding: 6px 12px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  cursor: pointer;
  color: var(--green-bright);
  touch-action: manipulation;
  transition: border-color .2s;
}
.lock-btn.locked { border-color: var(--red-hp); color: var(--red-hp); }

/* Scrollbar hidden */
.g-body::-webkit-scrollbar { display:none; }
.screen::-webkit-scrollbar { display:none; }

/* Anim */
.screen.active { animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getACtx() {
  if (!actx) actx = new AudioCtx();
  return actx;
}

// Pixel-style 8bit sounds via Web Audio API
function playSound(type) {
  try {
    const ctx = getACtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;

    if (type === 'click') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(880, now + 0.05);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    }
    else if (type === 'protein') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(660, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.08);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
    }
    else if (type === 'laugh') {
      // Ha ha ha sound
      [0, 0.18, 0.36].forEach((offset, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300 + i * 40, now + offset);
        osc.frequency.exponentialRampToValueAtTime(150, now + offset + 0.12);
        gain.gain.setValueAtTime(0.12, now + offset);
        gain.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.15);
        osc.start(now + offset); osc.stop(now + offset + 0.15);
      });
    }
    else if (type === 'submit') {
      // Victory fanfare
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, now + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
        osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.15);
      });
    }
    else if (type === 'photo') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1760, now + 0.15);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.start(now); osc.stop(now + 0.18);
    }
    else if (type === 'levelup') {
      // Epic level up
      const melody = [523,659,784,659,784,1047];
      melody.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = i % 2 === 0 ? 'square' : 'sawtooth';
        osc.frequency.value = freq;
        const t = now + i * 0.12;
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        osc.start(t); osc.stop(t + 0.18);
      });
    }
  } catch(e) {}
}

// Background music — 8bit loop using oscillators
let bgNodes = [];
let bgLoop = null;
let bgStarted = false;

const BG_MELODY = [
  523,659,784,1047,784,659,523,440,
  493,622,740,987,740,622,493,392
];
const BG_BASS = [130,130,164,164,174,174,196,196];

function startBGM() {
  if (bgStarted) return;
  bgStarted = true;
  const ctx = getACtx();
  if (ctx.state === 'suspended') ctx.resume();

  let beat = 0;
  const BPM = 140;
  const beatLen = 60 / BPM;

  function playBeat() {
    const now = ctx.currentTime;
    const noteIdx = beat % BG_MELODY.length;
    const bassIdx = Math.floor(beat / 2) % BG_BASS.length;

    // Melody
    const mOsc = ctx.createOscillator();
    const mGain = ctx.createGain();
    mOsc.connect(mGain); mGain.connect(ctx.destination);
    mOsc.type = 'square';
    mOsc.frequency.value = BG_MELODY[noteIdx];
    mGain.gain.setValueAtTime(0.04, now);
    mGain.gain.exponentialRampToValueAtTime(0.001, now + beatLen * 0.85);
    mOsc.start(now); mOsc.stop(now + beatLen);

    // Bass every 2 beats
    if (beat % 2 === 0) {
      const bOsc = ctx.createOscillator();
      const bGain = ctx.createGain();
      bOsc.connect(bGain); bGain.connect(ctx.destination);
      bOsc.type = 'sawtooth';
      bOsc.frequency.value = BG_BASS[bassIdx];
      bGain.gain.setValueAtTime(0.05, now);
      bGain.gain.exponentialRampToValueAtTime(0.001, now + beatLen * 1.8);
      bOsc.start(now); bOsc.stop(now + beatLen * 2);
    }

    beat++;
    bgLoop = setTimeout(playBeat, beatLen * 1000);
  }
  playBeat();
}

function stopBGM() {
  if (bgLoop) clearTimeout(bgLoop);
  bgStarted = false;
}

// Start BGM on first user interaction
document.addEventListener('touchstart', () => {
  if (!bgStarted && actx === null) startBGM();
}, { once: true });

// 每日重置時間 01:00
function getGameDate() {
  const now = new Date();
  // 若現在時間 < 01:00，算作前一天
  if (now.getHours() < 1) {
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    return yesterday.toISOString().split('T')[0];
  }
  return now.toISOString().split('T')[0];
}

  if (error) {
    if (error.code === '23505') toast('此名稱已存在！', true);
    else toast('建立失敗：' + error.message, true);
    return;
  }
  document.getElementById('newTeamName').value = '';
  S.teams.push({...data, players:[]});
  renderTeams();
  toast(`隊伍「${name}」已建立！`);
}
async function confirmTeam() {

    const { data: subs } = await sb.from('daily_submissions').select('*');
    const scoreMap = {};
    (subs||[]).forEach(s => { scoreMap[s.team_id] = (scoreMap[s.team_id]||0) + s.protein_count; });
    S.teams.forEach(t => { t.total_score = scoreMap[t.id]||0; });

    // 每日提交狀態
    const today = new Date().toISOString().split('T')[0];
    let todaySub = null;
    if (S.pid && S.pid !== 'observer') {
      try {
        const { data } = await sb.from('daily_submissions').select('*')
          .eq('player_id', S.pid).eq('submission_date', today).maybeSingle();
        todaySub = data;
      } catch(e) { todaySub = null; }
    }
    S.submitted = !!todaySub;

    // game_start_date fallback
    if (!S.startDate) S.startDate = getGameDate();

    const obsLabel = S.isObserver ? ' 👁' : '';
    document.getElementById('playerBadge').innerHTML =
      `<svg width="18" height="24"><use href="#c${S.cid}i"/></svg>&nbsp;${S.name}${obsLabel}`;

    // 載入鎖定狀態
    try {
      const { data: lockData } = await sb.from('game_settings').select('value').eq('key','locked').single();
      S.locked = lockData?.value === 'true';
    } catch(e) { S.locked = false; }

    renderCountdown();
    renderArena();
    renderHP();
    renderMission();
    renderLockState();
    showScreen('gameScreen');
    startBGM();
    if (!S.rtStarted) { subscribeRT(); S.rtStarted = true; }
  } catch(e) {
    console.error('loadGame error:', e);
    toast('載入失敗：' + (e.message || e), true);
  }
}

function renderCountdown() {
  if (!S.startDate) return;
  const end = new Date(S.startDate);
  end.setDate(end.getDate() + 31);
  const days = Math.max(0, Math.ceil((end - new Date()) / 86400000));
  document.getElementById('countBadge').textContent = `倒數 ${days} 天`;
}

function renderArena() {
  const c = document.getElementById('arenaTeams');
  c.innerHTML = '';
  const t1 = S.teams[0], t2 = S.teams[1];
  // Left
  const l = document.createElement('div');
  l.className = 'a-team-col';
  if (t1) {
    l.innerHTML = `<div class="a-team-label left">${t1.name}</div>`;
    const row = document.createElement('div');
    row.className = 'fighters-row';
    (t1.players||[]).forEach(p => {
      const isMe = p.id === S.pid;
      row.innerHTML += `<div class="fighter"><div class="fighter-name">${p.name}</div><div class="fighter-char${isMe?' me':''}" id="fc-${p.id}"><svg width="46" height="60"><use href="#c${p.character_id}i" id="cu-${p.id}"/></svg></div></div>`;
    });
    l.appendChild(row);
  }
  // VS
  const vs = document.createElement('div');
  vs.className = 'arena-vs'; vs.textContent = 'VS';
  // Right
  const r = document.createElement('div');
  r.className = 'a-team-col';
  if (t2) {
    r.innerHTML = `<div class="a-team-label right">${t2.name}</div>`;
    const row = document.createElement('div');
    row.className = 'fighters-row';
    (t2.players||[]).forEach(p => {
      const isMe = p.id === S.pid;
      row.innerHTML += `<div class="fighter"><div class="fighter-name">${p.name}</div><div class="fighter-char${isMe?' me':''}" id="fc-${p.id}"><svg width="46" height="60"><use href="#c${p.character_id}i" id="cu-${p.id}"/></svg></div></div>`;
    });
    r.appendChild(row);
  }
  c.appendChild(l); c.appendChild(vs); c.appendChild(r);
}

function renderHP() {
  const t1 = S.teams[0], t2 = S.teams[1];
  const s1 = t1?.total_score||0, s2 = t2?.total_score||0;
  const tot = s1+s2;
  const p1 = tot>0 ? Math.round(s1/tot*100) : 50;
  const p2 = 100-p1;
  document.getElementById('hpL').style.width = p1+'%';
  document.getElementById('hpR').style.width = p2+'%';
  document.getElementById('sL').textContent = s1+' 分';
  document.getElementById('sR').textContent = s2+' 分';
  document.getElementById('tnL').textContent = t1?.name||'-';
  document.getElementById('tnR').textContent = t2?.name||'-';
}

function renderMission() {
  const grid = document.getElementById('missionGrid');
  const btn = document.getElementById('submitBtn');
  const done = document.getElementById('doneBanner');
  if (S.isObserver) {
    grid.style.opacity='0.3'; grid.style.pointerEvents='none';
    btn.style.display='none';
    done.style.display='block';
    done.innerHTML='👁 觀察者模式<br><span style="font-size:7px;color:rgba(57,255,20,.5)">僅供觀看，不參與任務</span>';
    return;
  }
  if (S.submitted) {
    grid.style.opacity='0.4'; grid.style.pointerEvents='none';
    btn.style.display='none'; done.style.display='block';
    done.innerHTML='✅ 今日任務完成！<br><span style="font-size:7px;color:rgba(57,255,20,.6)">明天再來繼續戰鬥！</span>';
  } else {
    grid.style.opacity='1'; grid.style.pointerEvents='auto';
    btn.style.display='block'; done.style.display='none';
  }
  checkSubmitBtn();
}

// ===== PROTEIN =====
function pressProtein() {
  if (S.submitted) return;
  playSound('protein');
  S.protein = S.protein >= 20 ? 1 : S.protein + 1;
  document.getElementById('protNum').textContent = S.protein;
  const b = document.getElementById('muscleBtn');
  b.classList.remove('flex'); void b.offsetWidth; b.classList.add('flex');
  checkSubmitBtn();
}

// ===== PHOTO =====
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  playSound('photo');
  S.photoFile = file;
  const url = URL.createObjectURL(file);
  const box = document.getElementById('photoBox');
  box.innerHTML = `<img src="${url}" alt="早餐"/><div class="photo-ok">✓</div>`;
  box.classList.add('has-photo');
  checkSubmitBtn();
});

function checkSubmitBtn() {
  document.getElementById('submitBtn').disabled = !(S.photoFile && S.protein > 0);
}

// ===== SUBMIT =====
async function submitDaily() {
  if (!S.photoFile || S.protein === 0) return;
  playSound('click');
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '上傳中...';
  try {
    const ext = S.photoFile.name.split('.').pop()||'jpg';
    const path = `${S.pid}/${new Date().toISOString().split('T')[0]}.${ext}`;
    const { error: upErr } = await sb.storage.from('breakfast-photos').upload(path, S.photoFile, { upsert: true });
    if (upErr) throw upErr;
    const { data: urlD } = sb.storage.from('breakfast-photos').getPublicUrl(path);
    const today = getGameDate();
    const { error: subErr } = await sb.from('daily_submissions').insert({
      player_id: S.pid, player_name: S.name,
      team_id: S.tid, submission_date: today,
      protein_count: S.protein, photo_url: urlD.publicUrl
    });
    if (subErr) throw subErr;
    const myTeam = S.teams.find(t => t.id === S.tid);
    if (myTeam) await sb.from('teams').update({ total_score: (myTeam.total_score||0) + S.protein }).eq('id', S.tid);
    S.submitted = true;
    playSound('submit');
    await triggerLaugh(S.protein);
    playSound('levelup');
    showLevelUp();
    // Reload scores without re-subscribing RT
    const { data: newTeams } = await sb.from('teams').select('*, players(id,name,character_id,team_id)');
    if (newTeams) S.teams = newTeams;
    const { data: newSubs } = await sb.from('daily_submissions').select('*');
    const sm2 = {};
    (newSubs||[]).forEach(s => { sm2[s.team_id]=(sm2[s.team_id]||0)+s.protein_count; });
    S.teams.forEach(t => { t.total_score = sm2[t.id]||0; });
    renderHP(); renderArena(); renderMission();
  } catch(e) {
    console.error(e);
    toast('送出失敗！' + (e.message||''), true);
    btn.disabled = false; btn.textContent = '▶ 送出今日成果 ◀';
  }
}

async function triggerLaugh(times) {
  const fc = document.getElementById(`fc-${S.pid}`);
  if (!fc) return;
  const cu = document.getElementById(`cu-${S.pid}`);
  for (let i=0;i<times;i++) {
    if (cu) cu.setAttribute('href', `#c${S.cid}l`);
    fc.classList.add('laughing');
    playSound('laugh');
    await sleep(500);
    fc.classList.remove('laughing');
    if (cu) cu.setAttribute('href', `#c${S.cid}i`);
    await sleep(180);
  }
}

function showLevelUp() {
  const o = document.getElementById('luOverlay');
  o.classList.add('on');
  setTimeout(() => o.classList.remove('on'), 1500);
}

// ===== REALTIME =====
// ===== LOCK =====
function renderLockState() {
  const banner = document.getElementById('lockBanner');
  const btn = document.getElementById('lockBtn');
  if (!banner || !btn) return;
  banner.style.display = S.locked ? 'block' : 'none';
  if (S.isObserver) {
    btn.style.display = 'flex';
    btn.className = 'lock-btn' + (S.locked ? ' locked' : '');
    btn.innerHTML = S.locked ? '🔓 解鎖隊伍' : '🔒 鎖定隊伍';
  }
}

async function toggleLock() {
  const newVal = !S.locked;
  try {
    await sb.from('game_settings').upsert({ key: 'locked', value: String(newVal), updated_at: new Date().toISOString() });
    S.locked = newVal;
    renderLockState();
    toast(newVal ? '🔒 隊伍已鎖定！新成員無法加入' : '🔓 隊伍已解鎖！');
  } catch(e) {
    toast('操作失敗：' + e.message, true);
  }
}

function subscribeRT() {
  try { sb.removeChannel(sb.channel('bk-updates')); } catch(e) {}
  sb.channel('bk-updates')
    .on('postgres_changes',{event:'*',schema:'public',table:'teams'}, async () => {
      const {data} = await sb.from('teams').select('*, players(id,name,character_id,team_id)');
      if (data) S.teams = data;
      renderHP(); renderArena();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'game_settings'}, async () => {
      const { data } = await sb.from('game_settings').select('value').eq('key','locked').single();
      S.locked = data?.value === 'true';
      renderLockState();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'daily_submissions'}, async () => {
      const {data:subs} = await sb.from('daily_submissions').select('*');
      const sm = {};
      (subs||[]).forEach(s => { sm[s.team_id]=(sm[s.team_id]||0)+s.protein_count; });
      S.teams.forEach(t => t.total_score = sm[t.id]||0);
      renderHP();
    })
    .subscribe();
}

// ===== INIT =====
initStars();
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  showScreen('loginScreen');
}, 1700);
</script>
